version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
      time: "08:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 10
    allow:
      - dependency-name: "*"
        dependency-type: "all"
    groups:
      # Astro requires react and react-dom to be the exact same version,
      # so they must be bumped together in a single PR.
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "@astrojs/react"
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    cooldown:
      default-days: 7
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: daily
      time: "08:00"
      timezone: Europe/Paris
    commit-message:
      prefix: ci
      prefix-development: ci
      include: scope
    cooldown:
      default-days: 7
