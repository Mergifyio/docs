name: Continuous Integration
permissions: read-all

on:
  pull_request:
    branches:
      - main
      - devs/**

concurrency:
  # yamllint disable-line rule:line-length
  group: "${{ github.workflow }}-${{ github.head_ref || github.run_id }}"
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Check workflow files
        uses: docker://rhysd/actionlint:1.7.8
        with:
          args: -color

  lint:
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v7.0.0

      - name: Setup pnpm 📦
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node 🔧
        uses: actions/setup-node@v7.0.0
        with:
          cache: pnpm
          node-version-file: .node-version

      - name: Lint
        run: |
          pnpm install --frozen-lockfile
          pnpm check

  test:
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v7.0.0

      - name: Setup pnpm 📦
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node 🔧
        uses: actions/setup-node@v7.0.0
        with:
          cache: pnpm
          node-version-file: .node-version

      - name: Test
        run: |
          pnpm install --frozen-lockfile
          pnpm test

  config-examples:
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v7.0.0

      - name: Setup pnpm 📦
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node 🔧
        uses: actions/setup-node@v7.0.0
        with:
          cache: pnpm
          node-version-file: .node-version

      - name: Validate embedded Mergify config examples
        run: |
          pnpm install --frozen-lockfile
          pnpm check:config-examples

  build:
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v7.0.0

      - name: Setup pnpm 📦
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node 🔧
        uses: actions/setup-node@v7.0.0
        with:
          cache: pnpm
          node-version-file: .node-version

      - name: Build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  test-broken-links:
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v7.0.0

      - name: Setup pnpm 📦
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node 🔧
        uses: actions/setup-node@v7.0.0
        with:
          cache: pnpm
          node-version-file: .node-version

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Check links
        run: |
          pnpm install --frozen-lockfile
          pnpm check:links
